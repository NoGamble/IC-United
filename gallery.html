<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — IC United FC</title>
  <link rel="icon" type="image/png" href="assets/icons/favicon.png">
  <link rel="stylesheet" href="css/styles.css?v=8">
  <link rel="stylesheet" href="css/gallery.css?v=8">
</head>
<body>
  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>

  <nav class="nav">
    <a href="index.html" class="nav-logo">
      <img src="assets/icons/emblem.png" alt="" class="nav-logo-crest">
      IC UNITED
    </a>
    <div class="nav-links">
      <a href="index.html"   class="nav-link">Home</a>
      <a href="honors.html"  class="nav-link">Honors</a>
      <a href="players.html" class="nav-link">Players</a>
      <a href="gallery.html" class="nav-link">Gallery</a>
      <a href="clubs.html"   class="nav-link">Clubs</a>
    </div>
    <button class="nav-burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <header class="page-header">
    <div class="page-header-label">IC United FC</div>
    <h1>GALLERY</h1>
    <p>Match days, training sessions, and the moments in between.</p>
  </header>

  <!-- Filter -->
  <div class="section gallery-filter-wrap">
    <div class="gallery-filter" id="galleryFilter">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="match">Match</button>
      <button class="filter-btn" data-cat="team">Team</button>
      <button class="filter-btn" data-cat="training">Training</button>
      <button class="filter-btn" data-cat="ceremony">Ceremony</button>
    </div>
  </div>

  <!-- Masonry -->
  <div class="section gallery-section">
    <div class="gallery-masonry" id="galleryMasonry">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-inner">
      <button class="lightbox-close" id="lbClose">ESC · Close</button>
      <button class="lightbox-nav lightbox-prev" id="lbPrev" aria-label="Previous">‹</button>
      <button class="lightbox-nav lightbox-next" id="lbNext" aria-label="Next">›</button>
      <div class="lightbox-img" id="lbImg"></div>
      <div class="lightbox-caption">
        <span class="lightbox-caption-title" id="lbTitle"></span>
        <span class="lightbox-caption-date"  id="lbDate"></span>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-logo"><span>IC</span> UNITED FC</div>
    <div class="footer-copy">集成电路学院足球队 · Since 2020</div>
  </footer>

  <script src="js/data.js?v=8"></script>
  <script src="js/main.js?v=8"></script>
  <script src="js/gallery.js?v=8"></script>
</body>
</html>
